<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UML Gen</title>

    <!-- Mermaid -->
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

    <!-- CodeMirror -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closebrackets.min.js"></script>

    <!-- App styles -->
    <link rel="stylesheet" href="/static/style.css">

    <!-- Marked.js pour le rendu Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
</head>

<body>

    <div id="titlebar">
        <div class="traffic t-red"></div>
        <div class="traffic t-yellow"></div>
        <div class="traffic t-green"></div>
        <span>UML Gen — C++ Analyzer</span>
    </div>

    <div id="main">

        <!-- LEFT : éditeur -->
        <div id="left">
            <div id="tab-bar">
                <div class="tab active">
                    <div class="dot"></div> editor
                </div>
            </div>

            <div id="upload-bar">
                <label>fichier :</label>
                <button id="btn-upload" onclick="document.getElementById('file-input').click()">📂 Ouvrir</button>
                <input type="file" id="file-input" accept=".cpp,.h,.zip" onchange="loadFile()">
                <span id="file-name">aucun fichier</span>
            </div>

            <div id="github-bar">
                <label>github :</label>
                <input type="text" id="github-url" placeholder="https://github.com/user/repo" spellcheck="false">
                <button id="btn-github" onclick="analyzeGithub()">↓ Analyser</button>
            </div>

            <div id="editor-wrap">
                <textarea id="code-area" spellcheck="false"></textarea>
            </div>

            <div id="bottom-bar">
                <button id="btn-class" class="btn-mode active" onclick="setMode('class')">Classes</button>
                <button id="btn-state" class="btn-mode" onclick="setMode('state')">Statechart</button>
                <button id="btn-deps" class="btn-mode" onclick="setMode('deps')">Dépendances</button>
                <button class="btn-action" id="btn-gen" onclick="generate()">▶ Générer</button>
                <button class="btn-action" id="btn-svg" onclick="exportSVG()">↓ SVG</button>
                <button class="btn-action" id="btn-explain" onclick="explain()">✦ Expliquer</button>
                <span id="status">prêt</span>
            </div>
        </div>

        <!-- RIGHT : diagramme -->
        <div id="right">
            <div id="diagram-header">
                <span>aperçu</span>
                <span class="pill" id="class-count">—</span>
            </div>
            <div id="diagram-wrap">
                <div id="empty-state">
                    <div class="icon">⬡</div>
                    <p>lance la génération pour voir le diagramme</p>
                </div>
            </div>
            <div id="explain-panel" style="display:none;">
                <div id="explain-header">
                    ✦ Analyse IA
                    <span id="btn-collapse" onclick="toggleExplain()" style="margin-left:auto; cursor:pointer; color:var(--muted); font-size:14px;">↓</span>
                </div>
                <div id="explain-content"></div>
            </div>
        </div>

    </div>

    <script src="/static/app.js"></script>
</body>

</html>
